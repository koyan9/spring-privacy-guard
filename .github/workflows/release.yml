name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Display name for the release
        required: true
        type: string
      prerelease:
        description: Mark the release as prerelease
        required: true
        default: true
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Prepare wrapper
        run: chmod +x mvnw

      - name: Build release artifacts
        run: ./mvnw -B -q -Prelease-artifacts package

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp privacy-guard-core/target/*.jar release-artifacts/ || true
          cp privacy-guard-spring-boot-starter/target/*.jar release-artifacts/ || true

      - name: Generate release notes draft
        run: |
          cp RELEASE_NOTES_TEMPLATE.md RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Tag: ${{ inputs.tag }}" >> RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*