name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Display name for the release
        required: true
        type: string
      prerelease:
        description: Mark the release as prerelease
        required: true
        default: true
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build release artifacts
        run: mvn -B -q -Prelease-artifacts package

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp privacy-guard-core/target/*.jar release-artifacts/ || true
          cp privacy-guard-spring-boot-starter/target/*.jar release-artifacts/ || true

      - name: Prepare release notes
        shell: bash
        run: |
          notes_file="RELEASE_NOTES_${{ inputs.tag }}.md"
          if [ -f "$notes_file" ]; then
            echo "Using tag-specific release notes: $notes_file"
            cp "$notes_file" RELEASE_NOTES.md
          else
            echo "Using fallback release notes template"
            cp RELEASE_NOTES_TEMPLATE.md RELEASE_NOTES.md
          fi

          {
            echo ""
            echo "Tag: ${{ inputs.tag }}"
          } >> RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*