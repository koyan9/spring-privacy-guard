name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate repository hygiene
        run: python3 scripts/check_repo_hygiene.py --ci

  verify:
    needs: hygiene
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [17, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Verify project
        run: mvn -B -q verify

      - name: Upload JaCoCo reports
        if: matrix.java-version == 17
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report-java-${{ matrix.java-version }}
          path: |
            privacy-guard-core/target/site/jacoco/
            privacy-guard-spring-boot-starter/target/site/jacoco/

      - name: Install project artifacts locally
        run: mvn -B -q -DskipTests install

      - name: Compile sample
        run: mvn -B -q -f samples/privacy-demo/pom.xml -DskipTests compile
