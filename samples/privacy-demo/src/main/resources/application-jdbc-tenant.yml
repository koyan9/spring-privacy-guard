spring:
  datasource:
    url: jdbc:h2:file:./target/privacy-demo-jdbc-tenant-shared;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

demo:
  instance-id: node-1

privacy:
  guard:
    tenant:
      policies:
        tenant-a:
          observability:
            dead-letter:
              alert:
                receiver:
                  path-pattern: /demo-alert-receiver/tenant-a
                  bearer-token: demo-tenant-a-receiver-token
                  signature-secret: demo-tenant-a-receiver-secret
                  replay-namespace: tenant-a-receiver
        tenant-b:
          observability:
            dead-letter:
              alert:
                receiver:
                  path-pattern: /demo-alert-receiver/tenant-b
                  bearer-token: demo-tenant-b-receiver-token
                  signature-secret: demo-tenant-b-receiver-secret
                  replay-namespace: tenant-b-receiver
    audit:
      repository-type: JDBC
      jdbc:
        initialize-schema: true
        dialect: H2
        table-name: privacy_audit_event_jdbc_demo
        tenant-column-name: tenant_key
        tenant-detail-key: tenant
      dead-letter:
        repository-type: JDBC
        jdbc:
          initialize-schema: true
          dialect: H2
          table-name: privacy_audit_dead_letter_jdbc_demo
          tenant-column-name: tenant_key
          tenant-detail-key: tenant
        observability:
          alert:
            receiver:
              replay-store:
                jdbc:
                  enabled: true
                  initialize-schema: true
                  dialect: H2
                  table-name: privacy_audit_webhook_replay_store_jdbc_demo
                  cleanup-interval: 5m
