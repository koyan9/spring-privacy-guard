server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  health:
    redis:
      enabled: false
  endpoint:
    health:
      show-details: always
      show-components: always

demo:
  admin:
    token: demo-admin-token
    header-name: X-Demo-Admin-Token

privacy:
  guard:
    enabled: true
    fallback-mask-char: "*"
    tenant:
      enabled: true
      header-name: X-Privacy-Tenant
      default-tenant: public
      policies:
        public:
          audit:
            attach-tenant-id: true
            tenant-detail-key: tenant
          observability:
            dead-letter:
              warning-threshold: 2
              down-threshold: 4
        tenant-a:
          fallback-mask-char: "#"
          text:
            additional-patterns:
              - type: GENERIC
                pattern: EMP\d{4}
          logging:
            mdc:
              enabled: true
              include-keys:
                - email
                - phone
          audit:
            include-detail-keys:
              - phone
              - employeeCode
            attach-tenant-id: true
            tenant-detail-key: tenant
          observability:
            dead-letter:
              warning-threshold: 1
              down-threshold: 2
              notify-on-recovery: true
        tenant-b:
          fallback-mask-char: X
          logging:
            structured:
              enabled: true
              include-keys:
                - phone
          audit:
            include-detail-keys:
              - phone
            attach-tenant-id: true
            tenant-detail-key: tenant
          observability:
            dead-letter:
              warning-threshold: 2
              down-threshold: 4
              notify-on-recovery: false
    audit:
      repository-type: IN_MEMORY
      dead-letter:
        repository-type: IN_MEMORY
        observability:
          health:
            tenant-enabled: true
            tenant-ids:
              - public
              - tenant-a
              - tenant-b
            warning-threshold: 1
            down-threshold: 5
          metrics:
            tenant-enabled: true
            tenant-ids:
              - public
              - tenant-a
              - tenant-b
          alert:
            enabled: true
            check-interval: 50ms
            tenant:
              enabled: true
              tenant-ids:
                - tenant-a
                - tenant-b
            logging:
              enabled: true
            receiver:
              verification:
                enabled: true
                bearer-token: demo-receiver-token
                signature-secret: demo-receiver-secret
                signature-algorithm: HmacSHA256
                signature-header: X-Privacy-Alert-Signature
                timestamp-header: X-Privacy-Alert-Timestamp
                nonce-header: X-Privacy-Alert-Nonce
                max-skew: 5m
              filter:
                enabled: true
                path-pattern: /demo-alert-receiver
              replay-store:
                namespace: demo-default
                file:
                  enabled: false
                  path: ./target/demo-alert-replay-store.json
                jdbc:
                  enabled: false
                  initialize-schema: false
                  table-name: privacy_audit_webhook_replay_store
                  cleanup-interval: 5m
