spring:
  config:
    activate:
      on-profile: interceptor

privacy:
  guard:
    audit:
      dead-letter:
        observability:
          alert:
            receiver:
              filter:
                enabled: false
              interceptor:
                enabled: true
                path-pattern: /demo-alert-receiver
              replay-store:
                redis:
                  enabled: false
                  key-prefix: "privacy:demo:webhook:replay:"
                  scan-batch-size: 500
                jdbc:
                  enabled: false
                  initialize-schema: false
                  table-name: privacy_audit_webhook_replay_store
                  cleanup-interval: 5m
